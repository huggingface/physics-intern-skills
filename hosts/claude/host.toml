# Claude Code host configuration.
#
# The renderer reads this file to know how to map capabilities to tool names,
# where to write rendered files, and how to shape host-specific frontmatter.

name = "claude"
workspace_doc = "CLAUDE.md"
agents_dir = ".claude/agents"
agent_ext = ".md"
skills_dir = ".claude/skills"

# Heading prepended to each agent body. `{{name_cap}}` is the agent name with
# first letter capitalised.
agent_body_prefix = "# {{name_cap}}\n\n"

# Agent frontmatter: which manifest fields to emit, in order, and how.
# Claude needs: name, description, tools. Capabilities are joined with ", ".
agent_frontmatter_order = ["name", "description", "tools"]

[tools_map]
file_read = "Read"
file_write = "Write"
file_edit = "Edit"
shell = "Bash"
glob = "Glob"
grep = "Grep"
web_search = "WebSearch"
web_fetch = "WebFetch"

# No extras for Claude.
[agent_extra_fields]

# File-backed values: each is loaded from hosts/<host>/<filename> at render
# time. Missing files yield an empty string — Claude has no preamble.md.
[file_backed]
preamble = "preamble.md"
dispatch_example = "dispatch_example.md"
