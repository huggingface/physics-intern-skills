# PhysicsIntern workspace Codex config.
#
# Codex only loads this file after the user marks the project as trusted.
# The first time you launch `codex` in this directory, accept the trust
# prompt; subsequent launches will pick up the sandbox settings below.
#
# Sub-agent roles are NOT registered here: current Codex auto-discovers them
# from the .codex/agents/*.toml files the renderer writes, so this file only
# carries the workspace sandbox + web-search settings.

sandbox_mode = "workspace-write"
web_search = "cached"

[sandbox_workspace_write]
network_access = true
