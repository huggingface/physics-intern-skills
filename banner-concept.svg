<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1830"/>
      <stop offset="1" stop-color="#13284a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <style>
      .hand { font-family: 'Bradley Hand', 'Segoe Print', 'Comic Sans MS', cursive; }
      .mono { font-family: 'SF Mono', 'JetBrains Mono', 'Menlo', 'Consolas', monospace; }
    </style>
  </defs>

  <!-- ground -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- faint circular-membrane eigenmode (drum mode) backdrop -->
  <g transform="translate(600,330)" fill="none" stroke="#7fd1c9" stroke-width="1.4" opacity="0.08">
    <circle r="90"/><circle r="170"/><circle r="250"/><circle r="330"/>
    <line x1="-330" y1="0" x2="330" y2="0"/>
    <line x1="0" y1="-330" x2="0" y2="330"/>
    <line x1="-233" y1="-233" x2="233" y2="233"/>
    <line x1="-233" y1="233" x2="233" y2="-233"/>
  </g>

  <!-- wordmark -->
  <text x="70" y="86" font-size="40" font-weight="700" fill="#ffffff">Physics<tspan fill="#f2b134">Intern</tspan></text>
  <text x="74" y="116" font-size="18" fill="#9fb3d0">a research sidekick you steer — on Claude Code · Codex · Pi</text>

  <!-- ============ LEFT: notebook ============ -->
  <g filter="url(#shadow)">
    <rect x="70" y="150" width="470" height="345" rx="10" fill="#f6f1e3"/>
  </g>
  <!-- ruled lines + margin -->
  <g stroke="#cdd9e8" stroke-width="1">
    <line x1="90" y1="205" x2="520" y2="205"/><line x1="90" y1="245" x2="520" y2="245"/>
    <line x1="90" y1="285" x2="520" y2="285"/><line x1="90" y1="325" x2="520" y2="325"/>
    <line x1="90" y1="365" x2="520" y2="365"/><line x1="90" y1="405" x2="520" y2="405"/>
    <line x1="90" y1="445" x2="520" y2="445"/>
  </g>
  <line x1="118" y1="150" x2="118" y2="495" stroke="#e3a9a0" stroke-width="1.5"/>

  <text x="130" y="182" class="hand" font-size="17" fill="#8a7f68">research notebook</text>

  <!-- notebook equations (ink, italic serif for full math-glyph coverage) -->
  <g fill="#1f3040" font-family="Georgia, 'Times New Roman', serif" font-style="italic">
    <text x="132" y="236" font-size="28">(−Δ)φ = λφ ,  φ = 0 on ∂Ω</text>
    <text x="132" y="278" font-size="22">λ<tspan font-size="14" dy="6">n</tspan><tspan dy="-6"> = α</tspan><tspan font-size="14" dy="6">n</tspan><tspan font-size="22" dy="-6">²  →  the tones it makes</tspan></text>
  </g>

  <!-- walk-on-spheres sketch -->
  <g transform="translate(150,355)">
    <path d="M -40,18 C -60,-20 -10,-44 24,-36 C 64,-28 70,18 40,34 C 8,50 -22,46 -40,18 Z"
          fill="none" stroke="#4a6076" stroke-width="2"/>
    <circle cx="2" cy="-2" r="22" fill="none" stroke="#2f80b8" stroke-width="1.6" stroke-dasharray="4 3"/>
    <circle cx="2" cy="-2" r="2.5" fill="#2f80b8"/>
    <circle cx="20" cy="14" r="2.5" fill="#2f80b8"/>
    <text x="-44" y="56" class="hand" font-size="15" fill="#8a7f68">walk on spheres</text>
  </g>

  <!-- drum mode-shape thumbnails -->
  <g transform="translate(300,350)" stroke="#4a6076" stroke-width="1.4" fill="none">
    <g><circle r="22"/><line x1="0" y1="-22" x2="0" y2="22"/></g>
    <g transform="translate(60,0)"><circle r="22"/><line x1="-22" y1="0" x2="22" y2="0"/><line x1="0" y1="-22" x2="0" y2="22"/></g>
    <g transform="translate(120,0)"><circle r="22"/><circle r="10"/></g>
    <g transform="translate(180,0)"><circle r="22"/><line x1="-16" y1="-16" x2="16" y2="16"/><line x1="-16" y1="16" x2="16" y2="-16"/></g>
  </g>
  <text x="300" y="408" class="hand" font-size="15" fill="#8a7f68" text-anchor="middle">mode shapes</text>

  <text x="130" y="470" class="hand" font-size="18" fill="#b14b3a">what does the shape sound like?</text>

  <!-- ============ RIGHT: the intern (terminal) ============ -->
  <g filter="url(#shadow)">
    <rect x="660" y="150" width="470" height="345" rx="10" fill="#0d1726" stroke="#26395a" stroke-width="1"/>
  </g>
  <path d="M660 160 a10 10 0 0 1 10 -10 h450 a10 10 0 0 1 10 10 v24 h-470 Z" fill="#162741"/>
  <circle cx="682" cy="172" r="5" fill="#ec6a5e"/><circle cx="700" cy="172" r="5" fill="#f3bd4f"/><circle cx="718" cy="172" r="5" fill="#61c554"/>
  <text x="895" y="177" font-size="13" class="mono" fill="#7d92b3" text-anchor="middle">walk-on-sphere — codex</text>

  <g class="mono" font-size="16.5">
    <text x="684" y="222" fill="#cfe0f7">› /survey<tspan fill="#61c554">          ✓ survey.md</tspan></text>
    <text x="684" y="252" fill="#cfe0f7">› /research-plan<tspan fill="#f3bd4f">   ‖ awaiting approval</tspan></text>
    <text x="684" y="282" fill="#61c554">› ok, proceed</text>
    <text x="684" y="312" fill="#cfe0f7">› /derive<tspan fill="#7d92b3">         ⇒ D-001  D-002</tspan></text>
    <text x="684" y="342" fill="#cfe0f7">› /compute<tspan fill="#9fd0ff">    λ ≈ π², 4π²</tspan><tspan fill="#61c554">  C-001 ✓</tspan></text>
    <text x="684" y="372" fill="#cfe0f7">› /review · /critique</text>
    <text x="684" y="402" fill="#cfe0f7">› /finalize<tspan fill="#f2b134">       → answer.md</tspan></text>
  </g>
  <line x1="684" y1="428" x2="1106" y2="428" stroke="#26395a" stroke-width="1"/>
  <text x="684" y="458" font-size="14" class="mono" fill="#7d92b3">fresh-context sub-agents · 21 commits · files = state</text>

  <!-- ============ the "+" joining them ============ -->
  <circle cx="600" cy="322" r="34" fill="#f2b134" filter="url(#shadow)"/>
  <text x="600" y="335" font-size="40" font-weight="700" fill="#0b1830" text-anchor="middle">+</text>

  <!-- labels -->
  <text x="305" y="528" font-size="15" font-weight="700" letter-spacing="3" fill="#9fb3d0" text-anchor="middle">HUMAN</text>
  <text x="895" y="528" font-size="15" font-weight="700" letter-spacing="3" fill="#9fb3d0" text-anchor="middle">SIDEKICK</text>

  <!-- bottom tagline -->
  <text x="600" y="600" font-size="16" fill="#6f86a8" text-anchor="middle">approve the plan · steer the work · clear the context anytime · read the git log</text>
</svg>
